name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  hex:
    runs-on: ubuntu-latest
    services:
      falkordb:
        image: falkordb/falkordb:latest
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.1"
          otp-version: "28.1"

      - name: Install Hex/Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Install dependencies
        run: mix deps.get

      - name: Verify package before publish
        run: mix check

      - name: Wait for FalkorDB
        shell: bash
        run: |
          for i in {1..60}; do
            (echo > /dev/tcp/127.0.0.1/6379) >/dev/null 2>&1 && exit 0
            sleep 1
          done
          echo "FalkorDB did not become ready in time" >&2
          exit 1

      - name: Run integration tests
        env:
          FALKORDB_RUN_INTEGRATION: "1"
        run: mix test
      - name: Detect HEX_API_KEY
        id: hex_key
        shell: bash
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: |
          if [[ -n "${HEX_API_KEY}" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to Hex
        if: steps.hex_key.outputs.available == 'true'
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: mix hex.publish --yes

      - name: Skip publish (missing HEX_API_KEY)
        if: steps.hex_key.outputs.available != 'true'
        run: echo "HEX_API_KEY is not configured; skipping Hex publish."
